kind = "web"
previewPath = "/"
title = "Gestión de Inventario y Ventas"
version = "1.0.0"
id = "artifacts/inventario-ventas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/inventario-ventas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inventario-ventas", "run", "build" ]
publicDir = "artifacts/inventario-ventas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
